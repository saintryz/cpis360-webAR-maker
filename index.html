<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPIS 360 - Marker-Based WebAR Lab 1</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.8/aframe/build/aframe-ar.min.js"></script>
    <style>
      body { margin: 0; }
      .hud {
        position: fixed;
        z-index: 10;
        top: 14px;
        left: 14px;
        right: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(0,0,0,0.58);
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 14px;
        line-height: 1.4;
      }
      .hud strong { color: #7de2ff; }
    </style>
  </head>
  <body>
    <div class="hud">
      <strong>Ahmed JM – LAB 1 AR:</strong> point camera at a <code>HIRO</code> marker.
      <div id="status">Status: Initializing AR...</div>
    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
    >
      <a-marker preset="hiro">

        <!-- Shape 1: Box – rotating -->
        <a-box
          position="0 0.4 0"
          scale="1 1 1"
          width="0.4" height="0.4" depth="0.4"
          color="#ff4f7f"
          animation="property: rotation; to: 360 360 0; loop: true; dur: 4000; easing: linear;"
        ></a-box>

        <!-- Shape 2: Sphere – pulsing -->
        <a-sphere
          position="-0.7 0.3 0"
          scale="1 1 1"
          radius="0.22"
          color="#00d1ff"
          animation="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dir: alternate; loop: true; dur: 1200; easing: easeInOutSine;"
        ></a-sphere>

        <!-- Shape 3: Cylinder – bouncing -->
        <a-cylinder
          position="0.7 0.3 0"
          scale="1.2 1.2 1.2"
          radius="0.18" height="0.5"
          color="#9cff57"
          animation="property: position; from: 0.7 0.15 0; to: 0.7 0.55 0; dir: alternate; loop: true; dur: 900; easing: easeInOutSine;"
        ></a-cylinder>

        <!-- Student name -->
        <a-text
          value="Ahmed JM"
          position="0 1.0 0"
          align="center"
          color="#ffffff"
          width="3"
        ></a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      var status = document.getElementById("status");
      var scene  = document.querySelector("a-scene");

      scene.addEventListener("loaded", function () {
        status.textContent = "Status: Scene loaded. Show HIRO marker.";
      });
      scene.addEventListener("camera-init", function () {
        status.textContent = "Status: Camera started. Show HIRO marker.";
      });
      scene.addEventListener("camera-error", function () {
        status.textContent = "Status: Camera blocked — use HTTPS or localhost.";
      });
    </script>
  </body>
</html>
